<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N4 Tourist Destination Study Pack</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f4f8;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .cover-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .cover-content img.logo {
      width: 150px;
      height: auto;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.5rem;
      color: #003366;
      margin-bottom: 10px;
    }

    h3 {
      font-size: 1.2rem;
      color: #005599;
      margin-bottom: 30px;
    }

    .profile-img {
      border-radius: 50%;
      width: 120px;
      height: 120px;
      object-fit: cover;
      border: 3px solid #0077cc;
      margin-bottom: 30px;
    }

    button {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #0056b3;
    }

    footer {
      background-color: #003366;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 14px;
      margin-top: auto;
    }

    /* Responsive Typography */
    @media (max-width: 768px) {
      h1 {
        font-size: 2rem;
      }

      h3 {
        font-size: 1rem;
      }

      button {
        width: 80%;
        font-size: 14px;
      }
    }

    @media (max-width: 480px) {
      .profile-img {
        width: 100px;
        height: 100px;
      }

      .cover-content {
        padding: 30px 10px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="cover-content">
    <img src="images/logo.jpg" alt="Study Pack Logo" class="logo">
    <h1>N4 Tourist Destinations</h1>
    <h3>TVET College Online Study Pack</h3>
    <img src="images/karabo.jpg" alt="Karabo Bopape" class="profile-img" />
    <button onclick="location.href='module1.html'">Start Module 1</button>
  </div>

  <footer>
    Created by <strong>Karabo Bopape</strong>
  </footer>
</body>
</html>
